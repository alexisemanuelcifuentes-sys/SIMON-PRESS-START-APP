<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#05020b">
  <title>Simon Press Start</title>
  <link rel="icon" href="favicon.png">
  <style>
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#05020b;color:#fff;font-family:Arial,Helvetica,sans-serif}
    main{min-height:100svh;display:grid;place-items:center;overflow:hidden;position:relative;padding:22px 18px;text-align:center;background:radial-gradient(circle at 50% 35%,rgba(111,22,178,.5),transparent 32%),linear-gradient(145deg,#020107,#110522 52%,#030107)}
    main:before{content:"";position:absolute;inset:0;opacity:.25;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:36px 36px;transform:perspective(500px) rotateX(58deg) scale(1.7) translateY(28%)}
    section{position:relative;z-index:1;max-width:760px}.brand{display:block;width:clamp(145px,24vw,235px);aspect-ratio:1;object-fit:contain;margin:0 auto 6px;filter:drop-shadow(0 0 26px rgba(231,30,169,.42))}.studio{margin:0;letter-spacing:.32em;font-size:.72rem;color:#c39bdc}
    h1{margin:16px 0 0;font-size:clamp(3rem,12vw,7.2rem);line-height:.76;letter-spacing:-.07em;text-shadow:0 0 30px rgba(197,65,255,.6)}h1 span{color:#e353ff;font-size:.55em;letter-spacing:.06em}
    .tag{margin:27px auto 25px;color:#e8d9f1;font-size:clamp(1rem,3vw,1.25rem)}
    a{display:inline-block;padding:17px 34px;border:2px solid #f3b7ff;color:#fff;background:linear-gradient(135deg,#7a1fc5,#d02adc);box-shadow:0 0 28px rgba(219,67,255,.62);font-weight:900;letter-spacing:.14em;text-decoration:none;border-radius:6px}
    .hint{color:#a996b8;font-size:.78rem;margin-top:22px;line-height:1.5}
  </style>
</head>
<body><main><section><img class="brand" src="dment-creative-logo.jpg" alt="Dment Creative"><p class="studio">PRESENTA</p><h1>SIMON<br><span>PRESS START</span></h1><p class="tag">Entrá al otro mundo. Encontrá a Gaspar. Regresá a casa.</p><a href="game/index.html">JUGAR AHORA</a><p class="hint">Usá el celular en posición horizontal · Carga optimizada de aproximadamente 73 MB</p></section></main></body>
</html>
